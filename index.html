<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svarīgs Jautājums 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8556d;
    --blush: #f9c5d1;
    --cream: #fff8f2;
    --gold: #d4a843;
    --deep: #2a1520;
    --soft: #f2dde4;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #fce4ec 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #fce4ec 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, #fff3e0 0%, transparent 50%),
                var(--cream);
    z-index: 0;
  }

  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 15;
    overflow: hidden;
  }

  .heart-float {
    position: absolute;
    bottom: -60px;
    opacity: 0;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.85; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .star {
    position: fixed;
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
    z-index: 1;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(0.8); }
    50% { opacity: 0.9; transform: scale(1.3); }
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(232, 85, 109, 0.2);
    border-radius: 32px;
    padding: 48px 44px 40px;
    max-width: 520px;
    width: calc(100vw - 32px);
    text-align: center;
    box-shadow: 0 8px 60px rgba(232, 85, 109, 0.12), 0 2px 16px rgba(0,0,0,0.06);
    animation: cardEnter 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .envelope {
    font-size: 52px;
    display: inline-block;
    animation: envWiggle 3s ease-in-out infinite;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 12px rgba(232,85,109,0.3));
  }

  @keyframes envWiggle {
    0%, 100% { transform: rotate(-5deg) scale(1); }
    25% { transform: rotate(5deg) scale(1.05); }
    50% { transform: rotate(-3deg) scale(1.02); }
    75% { transform: rotate(4deg) scale(1.04); }
  }

  .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 14px;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 6vw, 40px);
    color: var(--deep);
    line-height: 1.2;
    margin-bottom: 8px;
    animation: shimmerText 4s ease-in-out infinite;
  }

  @keyframes shimmerText {
    0%, 100% { color: var(--deep); }
    50% { color: #8b2040; }
  }

  .name-highlight {
    font-style: italic;
    color: var(--rose);
    position: relative;
    display: inline-block;
  }

  .name-highlight::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    animation: underlineAnim 2s ease-in-out infinite;
  }

  @keyframes underlineAnim {
    0%, 100% { transform: scaleX(0.3); opacity: 0.4; }
    50% { transform: scaleX(1); opacity: 1; }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush), transparent);
  }
  .divider span { font-size: 16px; }

  .message {
    font-size: 16px;
    line-height: 1.75;
    color: #5a3344;
    margin-bottom: 24px;
  }

  .details-box {
    background: linear-gradient(135deg, #fff0f3, #fff8f0);
    border: 1px solid var(--blush);
    border-radius: 18px;
    padding: 18px 24px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-around;
    gap: 12px;
  }

  .detail-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .detail-icon {
    font-size: 24px;
    animation: detailPulse 2.5s ease-in-out infinite;
  }

  .detail-item:nth-child(2) .detail-icon { animation-delay: 0.5s; }
  .detail-item:nth-child(3) .detail-icon { animation-delay: 1s; }

  @keyframes detailPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .detail-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--rose);
  }

  .detail-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #c08090;
    font-weight: 500;
  }

  .question {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--deep);
    margin-bottom: 28px;
    font-style: italic;
  }

  .btn-group {
    display: flex;
    gap: 14px;
    justify-content: center;
    align-items: center;
  }

  .btn-yes {
    position: relative;
    background: linear-gradient(135deg, #e8556d, #c73a55);
    color: white;
    border: none;
    padding: 15px 40px;
    border-radius: 50px;
    font-size: 18px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(232, 85, 109, 0.4);
    transition: transform 0.2s, box-shadow 0.2s, font-size 0.3s;
    overflow: hidden;
  }

  .btn-yes::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    border-radius: 50px;
  }

  .btn-yes:hover {
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 10px 36px rgba(232, 85, 109, 0.5);
  }

  /* NO button — fixed, floats freely */
  .btn-no {
    position: fixed;
    background: white;
    color: #c08090;
    border: 1.5px solid var(--blush);
    padding: 13px 28px;
    border-radius: 50px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    cursor: pointer;
    z-index: 100;
    white-space: nowrap;
    transition: background 0.15s;
    /* start bottom-right */
    right: 28px;
    bottom: 28px;
    left: auto;
    top: auto;
  }

  .btn-no:hover { background: var(--soft); }

  /* Success screen */
  #success-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #2a1520, #5a1030);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 32px;
  }

  #success-screen.show {
    display: flex;
    animation: successEnter 0.6s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes successEnter {
    from { opacity: 0; transform: scale(1.05); }
    to { opacity: 1; transform: scale(1); }
  }

  .success-emoji {
    font-size: 80px;
    animation: bounceIn 0.8s cubic-bezier(.22,1,.36,1) 0.2s both;
    margin-bottom: 16px;
  }

  @keyframes bounceIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 7vw, 52px);
    color: var(--blush);
    margin-bottom: 12px;
    animation: fadeUp 0.7s ease 0.5s both;
    line-height: 1.2;
  }

  .success-sub {
    font-size: 18px;
    color: rgba(249, 197, 209, 0.7);
    animation: fadeUp 0.7s ease 0.7s both;
    max-width: 380px;
    line-height: 1.6;
  }

  .success-details {
    margin-top: 28px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(249,197,209,0.2);
    border-radius: 20px;
    padding: 20px 32px;
    animation: fadeUp 0.7s ease 0.9s both;
    color: var(--blush);
    font-size: 15px;
    line-height: 1.8;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    z-index: 300;
    animation: particleFly ease-out forwards;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
  }

  .shooting-star {
    position: fixed;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    z-index: 2;
    animation: shoot 1.5s ease-in forwards;
  }

  @keyframes shoot {
    0% { opacity: 1; box-shadow: 0 0 6px 2px rgba(255,255,255,0.8); }
    100% { transform: translate(-200px, 80px); opacity: 0; }
  }

  .petal {
    position: fixed;
    font-size: 18px;
    pointer-events: none;
    z-index: 2;
    animation: petalFall linear forwards;
  }

  @keyframes petalFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .no-tooltip {
    position: fixed;
    background: var(--deep);
    color: var(--blush);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 150;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .no-tooltip.show { opacity: 1; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="hearts-bg" id="hearts-bg"></div>

<div class="card" id="main-card">
  <div class="label">Personīgs uzaicinājums</div>
  <div class="envelope">💌</div>
  <h1><span class="name-highlight">Rēzija</span></h1>

  <div class="divider"><span>✨</span></div>

  <p class="message">
    Gribu tev uzdot vienu svarīgu jautājumu...<br>
    Un cerams, ka atbilde būs pareizā! 🥺
  </p>

  <div class="details-box">
    <div class="detail-item">
      <span class="detail-icon">📅</span>
      <span class="detail-text">31. maijs</span>
      <span class="detail-label">Datums</span>
    </div>
    <div class="detail-item">
      <span class="detail-icon">🕖</span>
      <span class="detail-text">19:00</span>
      <span class="detail-label">Laiks</span>
    </div>
    <div class="detail-item">
      <span class="detail-icon">✨</span>
      <span class="detail-text">Tikai mēs divi</span>
      <span class="detail-label">Kā</span>
    </div>
  </div>

  <p class="question">Vai nāksi uz randiņu ar mani? 💕</p>

  <div class="btn-group">
    <button class="btn-yes" id="btn-yes" onclick="sayYes()">
      💕 Jā, noteikti!
    </button>
  </div>
</div>

<button class="btn-no" id="btn-no">Nē...</button>
<div class="no-tooltip" id="no-tooltip"></div>

<div id="success-screen">
  <div class="success-emoji">🥳</div>
  <h2 class="success-title">Jūhū!! Viņa ir piekritusi!!</h2>
  <p class="success-sub">Zināju, ka piekritīsi! 🥰</p>
  <div class="success-details">
    📅 <strong>31. maijs</strong> &nbsp;·&nbsp; 🕖 <strong>19:00</strong><br>

  </div>
</div>

<script>
  // ── Floating hearts ────────────────────────────────────────────────────────
  const bgEl = document.getElementById('hearts-bg');
  const heartEmojis = ['💕','💖','💗','💓','🌸','✨','💫','🌷'];

  function spawnHeart() {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (14 + Math.random() * 20) + 'px';
    const dur = 8 + Math.random() * 10;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = (-Math.random() * dur) + 's';
    bgEl.appendChild(h);
    setTimeout(() => h.remove(), (dur + 2) * 1000);
  }

  for (let i = 0; i < 14; i++) spawnHeart();
  setInterval(spawnHeart, 1400);

  // ── Stars ──────────────────────────────────────────────────────────────────
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.animationDelay = (-Math.random() * 3) + 's';
    document.body.appendChild(s);
  }

  // ── Shooting stars ─────────────────────────────────────────────────────────
  function shootStar() {
    const s = document.createElement('div');
    s.className = 'shooting-star';
    s.style.left = (40 + Math.random() * 50) + 'vw';
    s.style.top = (5 + Math.random() * 30) + 'vh';
    s.style.animationDuration = (1 + Math.random() * 1.5) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2200);
  }
  setInterval(shootStar, 3500);

  // ── NO button ──────────────────────────────────────────────────────────────
  const noBtn = document.getElementById('btn-no');
  const tooltip = document.getElementById('no-tooltip');

  const noPhrases = [
    "Hei, stāvi! 😅", "Ā nē, ne tā! 🙃", "Poga aizskrēja! 😂",
    "Aizbēgu~ 🏃‍♀️", "Nope, netiek! 😜", "Haha, atkal! 😄",
    "Nekur nepaslēpsies! 💨", "Trāpīji gaisu! ✌️", "Mēģini vēl! 😝",
    "Nē ir nepareizā poga! 💅"
  ];
  let noCount = 0;

  function moveNo(e) {
    // Stop any actual click from registering
    if (e) { e.preventDefault(); e.stopPropagation(); }

    noCount++;

    // Grow yes button slightly
    const yesBtn = document.getElementById('btn-yes');
    const cur = parseFloat(yesBtn.style.fontSize) || 18;
    yesBtn.style.fontSize = Math.min(cur + 1.5, 28) + 'px';

    const margin = 16;
    const bw = noBtn.offsetWidth + margin * 2;
    const bh = noBtn.offsetHeight + margin * 2;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    let nx, ny, attempts = 0;
    do {
      nx = margin + Math.random() * (vw - bw);
      ny = margin + Math.random() * (vh - bh);
      attempts++;
      // Avoid the card area
      const card = document.getElementById('main-card').getBoundingClientRect();
      const overlaps = nx < card.right + 10 && (nx + bw) > card.left - 10
                    && ny < card.bottom + 10 && (ny + bh) > card.top - 10;
      if (!overlaps) break;
    } while (attempts < 30);

    noBtn.style.right = 'auto';
    noBtn.style.bottom = 'auto';
    noBtn.style.left = nx + 'px';
    noBtn.style.top = ny + 'px';

    // Tooltip
    const phrase = noPhrases[noCount % noPhrases.length];
    tooltip.textContent = phrase;
    tooltip.style.left = Math.min(nx, vw - 220) + 'px';
    tooltip.style.top = Math.max(4, ny - 38) + 'px';
    tooltip.classList.add('show');
    setTimeout(() => tooltip.classList.remove('show'), 3000);

    for (let i = 0; i < 3; i++) spawnPetal();

    // Flash the yes button
    yesBtn.style.transition = 'transform 0.1s, box-shadow 0.1s, background 0.1s';
    yesBtn.style.background = 'linear-gradient(135deg, #ff2255, #ff6b8a)';
    yesBtn.style.transform = 'scale(1.12)';
    yesBtn.style.boxShadow = '0 0 32px 8px rgba(232,85,109,0.7)';
    setTimeout(() => {
      yesBtn.style.background = '';
      yesBtn.style.transform = '';
      yesBtn.style.boxShadow = '';
    }, 400);
  }

  // Escape on hover (desktop) AND on click/touch
  noBtn.addEventListener('mouseenter', moveNo);
  noBtn.addEventListener('click', moveNo);
  noBtn.addEventListener('touchstart', moveNo, { passive: false });

  // ── Petals ─────────────────────────────────────────────────────────────────
  function spawnPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = ['🌸','🌷','🌺','💮'][Math.floor(Math.random() * 4)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = '-20px';
    const dur = 4 + Math.random() * 4;
    p.style.animationDuration = dur + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 200);
  }

  // ── YES ────────────────────────────────────────────────────────────────────
  function sayYes() {
    for (let i = 0; i < 6; i++) setTimeout(firework, i * 180);

    setTimeout(() => {
      document.getElementById('success-screen').classList.add('show');
      for (let i = 0; i < 40; i++) setTimeout(spawnPetal, i * 100);
      let c = 0;
      const iv = setInterval(() => { firework(); if (++c > 10) clearInterval(iv); }, 500);
    }, 750);
  }

  function firework() {
    const cx = Math.random() * window.innerWidth;
    const cy = Math.random() * window.innerHeight * 0.6;
    const colors = ['#e8556d','#f9c5d1','#d4a843','#fff','#c73a55','#ffb3c6','#ffd700','#ff6b8a'];
    const count = 30 + Math.floor(Math.random() * 14);

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const sz = 5 + Math.random() * 7;
      p.style.width = sz + 'px';
      p.style.height = sz + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 80 + Math.random() * 160;
      p.style.setProperty('--tx', (Math.cos(angle) * dist) + 'px');
      p.style.setProperty('--ty', (Math.sin(angle) * dist + Math.random() * 50) + 'px');
      p.style.animationDuration = (0.8 + Math.random() * 0.7) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1800);
    }

    const emojis = ['💖','✨','🎉','💕','🌟','🥰'];
    const e = document.createElement('div');
    e.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;font-size:36px;pointer-events:none;z-index:301;
      animation:particleFly 1.1s ease-out forwards;--tx:0px;--ty:-80px;transform:translate(-50%,-50%);`;
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 1200);
  }
</script>
</body>
</html>
